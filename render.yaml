services:
  - type: web
    name: link-bot
    runtime: python
    buildCommand: bash build.sh
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: BOT_PIN
        value: "1234"
      - key: SECRET_KEY
        generateValue: true
    plan: free
