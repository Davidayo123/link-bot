<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Link Bot — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ── Reset & Base ─────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #06080f;
            --surface: rgba(255,255,255,0.04);
            --surface-hover: rgba(255,255,255,0.07);
            --border: rgba(255,255,255,0.08);
            --border-glow: rgba(255,255,255,0.12);
            --text: #f0f0f5;
            --text-dim: rgba(255,255,255,0.45);
            --text-mid: rgba(255,255,255,0.7);
            --running: #00d4aa;
            --running-bg: rgba(0,212,170,0.1);
            --running-glow: rgba(0,212,170,0.35);
            --paused: #ffa726;
            --paused-bg: rgba(255,167,38,0.1);
            --paused-glow: rgba(255,167,38,0.35);
            --stopped: #ef5350;
            --stopped-bg: rgba(239,83,80,0.1);
            --stopped-glow: rgba(239,83,80,0.35);
            --info: #42a5f5;
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 8px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            top: -40%; left: -20%;
            width: 140%; height: 80%;
            background: radial-gradient(ellipse at 30% 50%, rgba(0,212,170,0.06) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 30%, rgba(66,165,245,0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Login Screen ─────────────────────────────────────── */
        #login-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            background: var(--bg);
        }

        #login-screen.hidden { display: none; }

        .login-card {
            width: 90%;
            max-width: 340px;
            text-align: center;
            animation: fadeUp 0.6s ease;
        }

        .login-icon {
            width: 72px; height: 72px;
            margin: 0 auto 20px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(0,212,170,0.15), rgba(66,165,245,0.15));
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .login-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        .login-subtitle {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 32px;
        }

        /* PIN Dots */
        .pin-dots {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-bottom: 28px;
        }

        .pin-dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            transition: all 0.2s ease;
        }

        .pin-dot.filled {
            background: var(--running);
            border-color: var(--running);
            box-shadow: 0 0 10px var(--running-glow);
        }

        .pin-dot.error {
            border-color: var(--stopped);
            background: var(--stopped);
            animation: shake 0.4s ease;
        }

        /* Numeric Keypad */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 280px;
            margin: 0 auto;
        }

        .key {
            height: 60px;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .key:active {
            background: rgba(255,255,255,0.1);
            transform: scale(0.95);
        }

        .key.key-action {
            font-size: 16px;
            color: var(--text-dim);
        }

        .key.key-enter {
            background: linear-gradient(135deg, rgba(0,212,170,0.2), rgba(0,212,170,0.1));
            border-color: rgba(0,212,170,0.3);
            color: var(--running);
            font-size: 14px;
            font-weight: 600;
        }

        .login-error {
            margin-top: 20px;
            font-size: 13px;
            color: var(--stopped);
            min-height: 20px;
            transition: opacity 0.3s;
        }

        /* ── Dashboard ────────────────────────────────────────── */
        #dashboard {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 16px 40px;
            animation: fadeUp 0.5s ease;
        }

        #dashboard.hidden { display: none; }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 0 2px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(0,212,170,0.2), rgba(66,165,245,0.15));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .btn-logout {
            border: none;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: var(--radius-xs);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-logout:hover { color: var(--text); border-color: var(--border-glow); }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 14px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: border-color 0.3s;
        }

        .card-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 14px;
        }

        /* ── Status Card ─────────────────────────────────────── */
        .status-card { position: relative; overflow: hidden; }

        .status-card.is-running { border-color: rgba(0,212,170,0.2); }
        .status-card.is-paused  { border-color: rgba(255,167,38,0.2); }
        .status-card.is-stopped { border-color: rgba(239,83,80,0.15); }

        .status-card.is-running::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--running), transparent);
            animation: shimmer 2s infinite;
        }

        .status-main {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
        }

        .status-indicator {
            width: 48px; height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            transition: all 0.4s;
        }

        .status-indicator.running {
            background: var(--running-bg);
            box-shadow: 0 0 20px var(--running-glow), inset 0 0 20px rgba(0,212,170,0.1);
            animation: pulse-running 2s infinite;
        }
        .status-indicator.paused {
            background: var(--paused-bg);
            box-shadow: 0 0 20px var(--paused-glow);
        }
        .status-indicator.stopped {
            background: var(--stopped-bg);
            box-shadow: 0 0 15px rgba(239,83,80,0.15);
        }

        .status-label {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .status-since {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .status-label.running { color: var(--running); }
        .status-label.paused  { color: var(--paused); }
        .status-label.stopped { color: var(--stopped); }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .stat-box {
            background: rgba(255,255,255,0.03);
            border-radius: var(--radius-xs);
            padding: 12px 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-value.countdown { color: var(--running); font-variant-numeric: tabular-nums; }

        .stat-label {
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-dim);
        }

        /* ── Controls ─────────────────────────────────────────── */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .controls .btn-pause { grid-column: 1 / -1; }

        .btn-ctrl {
            height: 52px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-ctrl:active { transform: scale(0.97); }

        .btn-start {
            background: linear-gradient(135deg, rgba(0,212,170,0.2), rgba(0,212,170,0.1));
            border: 1px solid rgba(0,212,170,0.3);
            color: var(--running);
        }
        .btn-start:hover { border-color: rgba(0,212,170,0.5); background: rgba(0,212,170,0.2); }

        .btn-stop {
            background: linear-gradient(135deg, rgba(239,83,80,0.15), rgba(239,83,80,0.08));
            border: 1px solid rgba(239,83,80,0.25);
            color: var(--stopped);
        }
        .btn-stop:hover { border-color: rgba(239,83,80,0.4); }

        .btn-pause {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-mid);
        }
        .btn-pause:hover { border-color: var(--border-glow); color: var(--text); }

        .btn-ctrl:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ── Settings ─────────────────────────────────────────── */
        .settings-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .settings-toggle .card-title { margin-bottom: 0; }

        .settings-chevron {
            font-size: 12px;
            color: var(--text-dim);
            transition: transform 0.3s;
        }

        .settings-chevron.open { transform: rotate(180deg); }

        .settings-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, margin-top 0.3s ease;
        }

        .settings-body.open {
            max-height: 300px;
            margin-top: 16px;
        }

        .field {
            margin-bottom: 12px;
        }

        .field label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 10px 12px;
            border-radius: var(--radius-xs);
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.3);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .field input:focus { border-color: rgba(0,212,170,0.4); }

        .btn-save {
            width: 100%;
            height: 42px;
            border: none;
            border-radius: var(--radius-xs);
            background: linear-gradient(135deg, rgba(66,165,245,0.2), rgba(66,165,245,0.1));
            border: 1px solid rgba(66,165,245,0.25);
            color: var(--info);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-save:hover { border-color: rgba(66,165,245,0.4); }
        .btn-save:active { transform: scale(0.98); }

        /* ── Activity Log ─────────────────────────────────────── */
        .log-list {
            max-height: 320px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }

        .log-list::-webkit-scrollbar { width: 4px; }
        .log-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .log-entry {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 9px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            animation: fadeIn 0.3s ease;
        }

        .log-entry:last-child { border-bottom: none; }

        .log-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            margin-top: 5px;
            flex-shrink: 0;
        }

        .log-dot.success { background: var(--running); box-shadow: 0 0 6px var(--running-glow); }
        .log-dot.error   { background: var(--stopped); box-shadow: 0 0 6px var(--stopped-glow); }
        .log-dot.info    { background: var(--info); }

        .log-msg {
            font-size: 12.5px;
            color: var(--text-mid);
            line-height: 1.4;
            flex: 1;
        }

        .log-time {
            font-size: 11px;
            color: var(--text-dim);
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
        }

        .log-empty {
            text-align: center;
            padding: 24px 0;
            color: var(--text-dim);
            font-size: 13px;
        }

        /* ── Toast ────────────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(20,20,30,0.95);
            border: 1px solid var(--border-glow);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            z-index: 2000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .toast.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── Animations ───────────────────────────────────────── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes pulse-running {
            0%, 100% { box-shadow: 0 0 20px var(--running-glow), inset 0 0 20px rgba(0,212,170,0.1); }
            50%      { box-shadow: 0 0 30px var(--running-glow), 0 0 60px rgba(0,212,170,0.1), inset 0 0 20px rgba(0,212,170,0.15); }
        }

        @keyframes shimmer {
            0%   { opacity: 0.4; }
            50%  { opacity: 1; }
            100% { opacity: 0.4; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%      { transform: translateX(-6px); }
            40%      { transform: translateX(6px); }
            60%      { transform: translateX(-4px); }
            80%      { transform: translateX(4px); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.15);
            border-top-color: var(--text);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
    </style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════════
     LOGIN SCREEN
     ════════════════════════════════════════════════════════════ -->
<div id="login-screen">
    <div class="login-card">
        <div class="login-icon">🤖</div>
        <div class="login-title">Link Bot</div>
        <div class="login-subtitle">Enter your PIN to continue</div>

        <div class="pin-dots" id="pin-dots">
            <div class="pin-dot" data-i="0"></div>
            <div class="pin-dot" data-i="1"></div>
            <div class="pin-dot" data-i="2"></div>
            <div class="pin-dot" data-i="3"></div>
        </div>

        <div class="keypad" id="keypad">
            <button class="key" data-val="1">1</button>
            <button class="key" data-val="2">2</button>
            <button class="key" data-val="3">3</button>
            <button class="key" data-val="4">4</button>
            <button class="key" data-val="5">5</button>
            <button class="key" data-val="6">6</button>
            <button class="key" data-val="7">7</button>
            <button class="key" data-val="8">8</button>
            <button class="key" data-val="9">9</button>
            <button class="key key-action" data-val="clear">✕</button>
            <button class="key" data-val="0">0</button>
            <button class="key key-enter" data-val="enter">GO</button>
        </div>

        <div class="login-error" id="login-error"></div>
    </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     DASHBOARD
     ════════════════════════════════════════════════════════════ -->
<div id="dashboard" class="hidden">

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="header-icon">🤖</div>
            <h1>Link Bot</h1>
        </div>
        <button class="btn-logout" id="btn-logout">Logout</button>
    </div>

    <!-- Status Card -->
    <div class="card status-card" id="status-card">
        <div class="status-main">
            <div class="status-indicator stopped" id="status-dot">⏹</div>
            <div>
                <div class="status-label stopped" id="status-label">Stopped</div>
                <div class="status-since" id="status-since"></div>
            </div>
        </div>
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-value" id="stat-visits">0</div>
                <div class="stat-label">Visits</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="stat-success">0</div>
                <div class="stat-label">Success</div>
            </div>
            <div class="stat-box">
                <div class="stat-value countdown" id="stat-next">—</div>
                <div class="stat-label">Next In</div>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="card">
        <div class="card-title">Controls</div>
        <div class="controls">
            <button class="btn-ctrl btn-start" id="btn-start">
                <span>▶</span> Start
            </button>
            <button class="btn-ctrl btn-stop" id="btn-stop">
                <span>■</span> Stop
            </button>
            <button class="btn-ctrl btn-pause" id="btn-pause">
                <span>⏸</span> Pause
            </button>
        </div>
    </div>

    <!-- Settings -->
    <div class="card">
        <div class="settings-toggle" id="settings-toggle">
            <div class="card-title">Settings</div>
            <span class="settings-chevron" id="settings-chevron">▼</span>
        </div>
        <div class="settings-body" id="settings-body">
            <div class="field">
                <label>Target URL</label>
                <input type="url" id="input-url" placeholder="https://...">
            </div>
            <div class="field">
                <label>Interval (minutes)</label>
                <input type="number" id="input-interval" min="1" max="1440" placeholder="10">
            </div>
            <button class="btn-save" id="btn-save">Save Settings</button>
        </div>
    </div>

    <!-- Activity Log -->
    <div class="card">
        <div class="card-title">Activity Log</div>
        <div class="log-list" id="log-list">
            <div class="log-empty">No activity yet</div>
        </div>
    </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── State ──────────────────────────────────────────────────────
let pin = '';
let pollTimer = null;
let countdownTimer = null;
let nextVisitTime = null;

// ─── DOM ────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

const loginScreen  = $('login-screen');
const dashboard    = $('dashboard');
const pinDots      = $('pin-dots');
const loginError   = $('login-error');
const statusCard   = $('status-card');
const statusDot    = $('status-dot');
const statusLabel  = $('status-label');
const statusSince  = $('status-since');
const statVisits   = $('stat-visits');
const statSuccess  = $('stat-success');
const statNext     = $('stat-next');
const logList      = $('log-list');
const inputUrl     = $('input-url');
const inputInterval= $('input-interval');
const toast        = $('toast');

// ─── Helpers ────────────────────────────────────────────────────
async function api(path, method = 'GET', body = null) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch('/api/' + path, opts);
    const data = await res.json();
    if (!res.ok) throw { status: res.status, ...data };
    return data;
}

function showToast(msg, ms = 2500) {
    toast.textContent = msg;
    toast.classList.add('visible');
    setTimeout(() => toast.classList.remove('visible'), ms);
}

// ─── PIN Keypad ─────────────────────────────────────────────────
$('keypad').addEventListener('click', e => {
    const btn = e.target.closest('.key');
    if (!btn) return;
    const val = btn.dataset.val;

    if (val === 'clear') {
        pin = '';
    } else if (val === 'enter') {
        tryLogin();
        return;
    } else if (pin.length < 4) {
        pin += val;
    }

    updateDots();

    // Auto-submit on 4 digits
    if (pin.length === 4) {
        setTimeout(tryLogin, 200);
    }
});

function updateDots() {
    pinDots.querySelectorAll('.pin-dot').forEach((dot, i) => {
        dot.classList.toggle('filled', i < pin.length);
        dot.classList.remove('error');
    });
    loginError.textContent = '';
}

async function tryLogin() {
    if (!pin) return;
    try {
        await api('login', 'POST', { pin });
        showDashboard();
    } catch (err) {
        pinDots.querySelectorAll('.pin-dot').forEach(d => {
            d.classList.remove('filled');
            d.classList.add('error');
        });
        loginError.textContent = 'Wrong PIN — try again';
        setTimeout(() => { pin = ''; updateDots(); }, 600);
    }
}

// ─── Auth Check on Load ─────────────────────────────────────────
async function checkAuth() {
    try {
        await api('status');
        showDashboard();
    } catch {
        loginScreen.classList.remove('hidden');
        dashboard.classList.add('hidden');
    }
}

function showDashboard() {
    loginScreen.classList.add('hidden');
    dashboard.classList.remove('hidden');
    pin = '';
    startPolling();
}

// ─── Dashboard Polling ──────────────────────────────────────────
function startPolling() {
    fetchStatus();
    pollTimer = setInterval(fetchStatus, 5000);
    countdownTimer = setInterval(updateCountdown, 1000);
}

async function fetchStatus() {
    try {
        const data = await api('status');
        renderStatus(data);
    } catch (err) {
        if (err.status === 401) {
            clearInterval(pollTimer);
            clearInterval(countdownTimer);
            loginScreen.classList.remove('hidden');
            dashboard.classList.add('hidden');
        }
    }
}

function renderStatus(data) {
    const s = data.status; // running, paused, stopped

    // Status card border
    statusCard.className = 'card status-card is-' + s;

    // Indicator
    statusDot.className = 'status-indicator ' + s;
    statusDot.textContent = s === 'running' ? '▶' : s === 'paused' ? '⏸' : '⏹';

    // Label
    statusLabel.className = 'status-label ' + s;
    statusLabel.textContent = s.charAt(0).toUpperCase() + s.slice(1);

    // Since
    if (data.startedAt && s !== 'stopped') {
        statusSince.textContent = 'since ' + data.startedAt.split(' ')[1];
    } else {
        statusSince.textContent = '';
    }

    // Stats
    statVisits.textContent = data.visitCount;
    statSuccess.textContent = data.successCount;

    // Countdown
    if (data.nextVisit && s === 'running') {
        nextVisitTime = new Date(data.nextVisit.replace(' ', 'T'));
    } else {
        nextVisitTime = null;
        statNext.textContent = '—';
    }

    // Settings
    inputUrl.placeholder = data.url || '';
    inputInterval.placeholder = data.interval || 10;

    // Buttons
    $('btn-start').disabled = (s === 'running');
    $('btn-stop').disabled  = (s === 'stopped');
    $('btn-pause').disabled = (s === 'stopped');
    $('btn-pause').innerHTML = (s === 'paused')
        ? '<span>▶</span> Resume'
        : '<span>⏸</span> Pause';

    // Log
    renderLog(data.log);
}

function updateCountdown() {
    if (!nextVisitTime) return;
    const diff = Math.max(0, Math.floor((nextVisitTime - new Date()) / 1000));
    const m = Math.floor(diff / 60);
    const sec = diff % 60;
    statNext.textContent = `${m}:${String(sec).padStart(2, '0')}`;
}

function renderLog(entries) {
    if (!entries || entries.length === 0) {
        logList.innerHTML = '<div class="log-empty">No activity yet</div>';
        return;
    }
    logList.innerHTML = entries.map(e => `
        <div class="log-entry">
            <div class="log-dot ${e.level}"></div>
            <div class="log-msg">${escHtml(e.msg)}</div>
            <div class="log-time">${e.time}</div>
        </div>
    `).join('');
}

function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

// ─── Controls ───────────────────────────────────────────────────
$('btn-start').addEventListener('click', async () => {
    try { const r = await api('start', 'POST'); showToast(r.msg); fetchStatus(); }
    catch (e) { showToast(e.msg || 'Error'); }
});
$('btn-stop').addEventListener('click', async () => {
    try { const r = await api('stop', 'POST'); showToast(r.msg); fetchStatus(); }
    catch (e) { showToast(e.msg || 'Error'); }
});
$('btn-pause').addEventListener('click', async () => {
    try { const r = await api('pause', 'POST'); showToast(r.msg); fetchStatus(); }
    catch (e) { showToast(e.msg || 'Error'); }
});

// Logout
$('btn-logout').addEventListener('click', async () => {
    await api('logout', 'POST');
    clearInterval(pollTimer);
    clearInterval(countdownTimer);
    loginScreen.classList.remove('hidden');
    dashboard.classList.add('hidden');
});

// ─── Settings ───────────────────────────────────────────────────
$('settings-toggle').addEventListener('click', () => {
    $('settings-body').classList.toggle('open');
    $('settings-chevron').classList.toggle('open');
});

$('btn-save').addEventListener('click', async () => {
    const body = {};
    const u = inputUrl.value.trim();
    const i = inputInterval.value.trim();
    if (u) body.url = u;
    if (i) body.interval = parseInt(i, 10);
    if (Object.keys(body).length === 0) { showToast('Nothing to save'); return; }
    try {
        const r = await api('settings', 'POST', body);
        showToast(r.msg);
        inputUrl.value = '';
        inputInterval.value = '';
        fetchStatus();
    } catch (e) { showToast(e.msg || 'Error'); }
});

// ─── Init ───────────────────────────────────────────────────────
checkAuth();
</script>
</body>
</html>
